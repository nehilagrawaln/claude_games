<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      min-height: 100vh;
    }
    h1 { font-size: 2.5rem; margin-bottom: 10px; }
    p { color: #888; margin-bottom: 50px; }
    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 800px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      text-decoration: none;
      color: #fff;
      transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover {
      border-color: #555;
      transform: translateY(-4px);
    }
    .card .emoji { font-size: 2.5rem; margin-bottom: 12px; }
    .card h2 { font-size: 1.1rem; }
    .coming-soon { opacity: 0.4; cursor: default; pointer-events: none; }
  </style>
</head>
<body>
  <h1>Claude Games</h1>
  <p>Games built with Claude Code</p>
  <div class="games">
    <!-- Add game cards here as games are built -->
    <div class="card coming-soon">
      <div class="emoji">🎮</div>
      <h2>Coming Soon</h2>
    </div>
  </div>
</body>
</html>
